<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Workout Tracker — Mobile UI Kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0a0a0a;color:#fff;font-family:var(--font-sans);min-height:100vh;}
  *{box-sizing:border-box;}
  .stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .phone{width:390px;height:780px;border-radius:44px;background:#000;border:1px solid #262626;
    box-shadow:0 40px 80px rgba(0,0,0,0.8);position:relative;overflow:hidden;}
  .phone::before{content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);
    width:120px;height:30px;background:#000;border-radius:20px;z-index:50;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;}
  .statusbar{height:44px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 6px;font-size:14px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums;flex-shrink:0;}
  .scrollarea{flex:1;overflow-y:auto;padding:16px 16px 80px;}
  .scrollarea.full{padding-bottom:16px;}
  ::-webkit-scrollbar{width:0;}
  input,button,textarea{font-family:inherit;}
</style>
</head>
<body>
  <div id="root" class="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Tokens.jsx"></script>
  <script type="text/babel" src="Icon.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const LOGIN_TWEAKS = /*EDITMODE-BEGIN*/{
      "loginVariant": "glow"
    }/*EDITMODE-END*/;

    function StatusBar() {
      return (
        <div className="statusbar">
          <span>9:41</span>
          <span>•••</span>
        </div>
      );
    }
    function App() {
      const [auth, setAuth] = useState(false);
      const [tab, setTab] = useState("today");
      const [mode, setMode] = useState("nav"); // nav | workout
      const [openDay, setOpenDay] = useState(null); // iso string when calendar day sheet is open
      const [tweaks, setTweak] = useTweaks(LOGIN_TWEAKS);

      let body, hideNav = false;
      if (!auth) {
        body = <LoginScreen onSignIn={()=>setAuth(true)} variant={tweaks.loginVariant}/>;
        hideNav = true;
      } else if (mode==="workout") {
        body = <WorkoutScreen onFinish={()=>{setMode("nav"); setTab("calendar");}}/>;
        hideNav = true;
      } else if (tab==="today") body = <TodayScreen onStart={()=>setMode("workout")}/>;
      else if (tab==="program") body = <ProgramScreen onStart={()=>setMode("workout")}/>;
      else if (tab==="calendar") body = <CalendarScreen onOpenDay={(iso)=>setOpenDay(iso)}/>;
      else if (tab==="history") body = <HistoryScreen/>;
      else if (tab==="body") body = <BodyScreen/>;
      else if (tab==="settings") body = <SettingsScreen onSignOut={()=>{setAuth(false);setTab("today");}}/>;

      return (
        <React.Fragment>
          <div className="phone">
            <div className="screen">
              <StatusBar/>
              <div className={"scrollarea"+(hideNav?" full":"")}>{body}</div>
            </div>
            <BottomNav tab={tab} onTab={(k)=>{ setOpenDay(null); setTab(k); }} hidden={hideNav}/>
            {openDay ? <DayDetailSheet onClose={()=>setOpenDay(null)}/> : null}
          </div>
          <TweaksPanel title="Tweaks">
            <TweakSection label="Login background"/>
            <TweakRadio
              label="Variant"
              value={tweaks.loginVariant}
              onChange={v=>{ setTweak("loginVariant", v); if (auth) setAuth(false); }}
              options={[
                {value:"minimal", label:"Minimal"},
                {value:"glow",    label:"Glow"},
                {value:"barbell", label:"Barbell"},
              ]}
            />
          </TweaksPanel>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
