<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<p class="eyebrow">Buttons</p>
<div style="display:flex;flex-direction:column;gap:8px;max-width:380px">
  <button style="height:56px;border-radius:6px;background:#fff;color:#000;font-weight:500;font-size:16px;border:none;cursor:pointer">Start workout</button>
  <button style="height:48px;border-radius:6px;background:#10b981;color:#000;font-weight:500;font-size:14px;border:none;cursor:pointer">Finish workout</button>
  <button style="height:40px;border-radius:6px;background:#fff;color:#000;font-weight:500;font-size:12px;border:none;cursor:pointer">Use this program</button>
  <button style="height:36px;padding:0 12px;border-radius:6px;background:transparent;color:#d4d4d4;font-size:11px;border:1px solid #262626;cursor:pointer;align-self:flex-start">+ New program</button>
  <button style="height:40px;border-radius:6px;background:transparent;color:#d4d4d4;font-size:12px;border:1px dashed #404040;cursor:pointer">+ Add day</button>
  <button style="height:48px;border-radius:6px;background:#fff;color:#000;font-weight:500;font-size:16px;border:none;cursor:pointer;opacity:0.5" disabled>Sending…</button>
</div>
</body></html>
