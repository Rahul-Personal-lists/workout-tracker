<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row cols-3">
  <div class="swatch"><div class="chip" style="background:#000;border-color:#262626"></div><div class="meta"><span class="label">Background</span><span class="hex">#000000 · --bg</span></div></div>
  <div class="swatch"><div class="chip" style="background:#0a0a0a"></div><div class="meta"><span class="label">Sheet</span><span class="hex">#0a0a0a · neutral-950</span></div></div>
  <div class="swatch"><div class="chip" style="background:#171717"></div><div class="meta"><span class="label">Card</span><span class="hex">#171717 · neutral-900</span></div></div>
  <div class="swatch"><div class="chip" style="background:#262626"></div><div class="meta"><span class="label">Pressed / border</span><span class="hex">#262626 · neutral-800</span></div></div>
  <div class="swatch"><div class="chip" style="background:#404040"></div><div class="meta"><span class="label">Border focus</span><span class="hex">#404040 · neutral-700</span></div></div>
  <div class="swatch"><div class="chip" style="background:#525252"></div><div class="meta"><span class="label">Disabled</span><span class="hex">#525252 · neutral-600</span></div></div>
</div>
