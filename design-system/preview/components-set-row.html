<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<p class="eyebrow">Set rows — incomplete / completed / hint</p>
<div style="max-width:380px;display:flex;flex-direction:column;gap:6px">
  <div style="display:grid;grid-template-columns:1fr 1fr 44px;gap:8px;align-items:center;background:#0a0a0a;border-radius:6px;padding:6px 8px">
    <div style="display:flex;flex-direction:column">
      <input style="height:44px;border:1px solid transparent;background:transparent;color:#fff;text-align:center;font-size:16px;font-variant-numeric:tabular-nums;outline:none;border-radius:4px" value="75"/>
      <span style="font-size:10px;color:#737373;padding:0 4px;margin-top:-2px">last: 70 × 5</span>
    </div>
    <input style="height:44px;border:1px solid transparent;background:transparent;color:#fff;text-align:center;font-size:16px;font-variant-numeric:tabular-nums;outline:none;border-radius:4px" value="5"/>
    <button style="height:44px;width:44px;border-radius:6px;border:1px solid #404040;background:transparent;color:#737373;display:inline-flex;align-items:center;justify-content:center;cursor:pointer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 44px;gap:8px;align-items:center;background:rgba(38,38,38,0.6);border-radius:6px;padding:6px 8px">
    <input style="height:44px;border:1px solid transparent;background:transparent;color:#a3a3a3;text-align:center;font-size:16px;font-variant-numeric:tabular-nums;outline:none;border-radius:4px" value="75"/>
    <input style="height:44px;border:1px solid transparent;background:transparent;color:#a3a3a3;text-align:center;font-size:16px;font-variant-numeric:tabular-nums;outline:none;border-radius:4px" value="5"/>
    <button style="height:44px;width:44px;border-radius:6px;border:1px solid #10b981;background:#10b981;color:#000;display:inline-flex;align-items:center;justify-content:center;cursor:pointer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
  </div>
</div>
</body></html>
