<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<p class="eyebrow">Iconography — Lucide only · stroke-current · sized 14/16/20</p>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px;color:#d4d4d4">
  <!-- play -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg><span style="font-size:10px;color:#737373">play</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span style="font-size:10px;color:#737373">plus</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg><span style="font-size:10px;color:#737373">minus</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:10px;color:#737373">check 3wt</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span style="font-size:10px;color:#737373">x</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg><span style="font-size:10px;color:#737373">camera</span></div>
</div>
<p style="margin:14px 0 0;font-size:12px;color:#a3a3a3">Color: inherit (<code style="font-family:'Geist Mono',monospace;color:#d4d4d4">currentColor</code>). No emoji. No unicode glyphs. No custom SVG.</p>
</body></html>
