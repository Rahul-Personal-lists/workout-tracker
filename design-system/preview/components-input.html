<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<p class="eyebrow">Inputs — email, notes, focus state</p>
<div style="max-width:380px;display:flex;flex-direction:column;gap:8px">
  <input style="width:100%;height:48px;border-radius:6px;background:#171717;border:1px solid #262626;padding:0 16px;color:#fff;font-size:16px;outline:none" placeholder="you@example.com"/>
  <input style="width:100%;height:48px;border-radius:6px;background:#171717;border:1px solid #404040;padding:0 16px;color:#fff;font-size:16px;outline:none" value="rahul@example.com"/>
  <textarea rows="2" style="width:100%;border-radius:6px;background:#171717;border:1px solid #262626;padding:8px 12px;color:#fff;font-size:14px;outline:none;font-family:inherit;resize:none" placeholder="Felt strong, bumped weight on…"></textarea>
</div>
</body></html>
