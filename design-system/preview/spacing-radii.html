<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<p class="eyebrow">Spacing — 4px base, the values that actually appear in source</p>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px">
  <div style="text-align:center"><div style="height:4px;width:4px;background:#d4d4d4;margin:14px auto"></div><span class="num" style="font-size:11px;color:#a3a3a3">4</span></div>
  <div style="text-align:center"><div style="height:8px;width:8px;background:#d4d4d4;margin:12px auto"></div><span class="num" style="font-size:11px;color:#a3a3a3">8</span></div>
  <div style="text-align:center"><div style="height:12px;width:12px;background:#d4d4d4;margin:10px auto"></div><span class="num" style="font-size:11px;color:#a3a3a3">12</span></div>
  <div style="text-align:center"><div style="height:16px;width:16px;background:#d4d4d4;margin:8px auto"></div><span class="num" style="font-size:11px;color:#a3a3a3">16</span></div>
  <div style="text-align:center"><div style="height:20px;width:20px;background:#d4d4d4;margin:6px auto"></div><span class="num" style="font-size:11px;color:#a3a3a3">20</span></div>
  <div style="text-align:center"><div style="height:24px;width:24px;background:#d4d4d4;margin:4px auto"></div><span class="num" style="font-size:11px;color:#a3a3a3">24</span></div>
</div>
<p class="eyebrow">Radii</p>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">
  <div style="text-align:center"><div style="height:48px;border-radius:4px;border:1px solid #262626;background:#171717"></div><span class="num" style="font-size:11px;color:#a3a3a3">4 · sm</span></div>
  <div style="text-align:center"><div style="height:48px;border-radius:6px;border:1px solid #262626;background:#171717"></div><span class="num" style="font-size:11px;color:#a3a3a3">6 · md ★</span></div>
  <div style="text-align:center"><div style="height:48px;border-radius:8px;border:1px solid #262626;background:#171717"></div><span class="num" style="font-size:11px;color:#a3a3a3">8 · lg</span></div>
  <div style="text-align:center"><div style="height:48px;border-radius:12px 12px 0 0;border:1px solid #262626;background:#171717"></div><span class="num" style="font-size:11px;color:#a3a3a3">12 · sheet</span></div>
  <div style="text-align:center"><div style="height:48px;width:48px;margin:0 auto;border-radius:9999px;border:1px solid #262626;background:#171717"></div><span class="num" style="font-size:11px;color:#a3a3a3">full</span></div>
</div>
</body></html>
