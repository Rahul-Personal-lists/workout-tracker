<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<p class="eyebrow">Rest timer — idle (collapsed) and active</p>
<div style="max-width:380px;display:flex;flex-direction:column;gap:10px">
  <div style="border:1px solid #262626;background:#171717;border-radius:8px;padding:10px 12px;font-size:12px;color:#a3a3a3">▸ Rest: 90s default</div>
  <div style="border:1px solid rgba(16,185,129,0.4);background:rgba(16,185,129,0.10);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:12px">
    <span style="font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#34d399">Rest</span>
    <span style="flex:1;text-align:center;font-size:18px;font-weight:600;color:#6ee7b7;font-variant-numeric:tabular-nums">1:23</span>
    <button style="height:32px;width:32px;border-radius:4px;border:1px solid rgba(16,185,129,0.4);background:transparent;color:#6ee7b7;cursor:pointer">−</button>
    <button style="height:32px;width:32px;border-radius:4px;border:1px solid rgba(16,185,129,0.4);background:transparent;color:#6ee7b7;cursor:pointer">+</button>
    <button style="height:32px;width:32px;border-radius:4px;background:transparent;color:#6ee7b7;border:none;cursor:pointer">×</button>
  </div>
  <div style="border:1px solid #262626;background:#171717;border-radius:8px;padding:10px 12px">
    <div style="font-size:12px;color:#a3a3a3;margin-bottom:8px">Rest: 90s default</div>
    <div style="display:flex;gap:6px;align-items:center">
      <button style="height:32px;padding:0 10px;border-radius:4px;border:1px solid #262626;background:transparent;color:#a3a3a3;font-size:11px;font-variant-numeric:tabular-nums;cursor:pointer">60s</button>
      <button style="height:32px;padding:0 10px;border-radius:4px;border:1px solid #10b981;background:transparent;color:#34d399;font-size:11px;font-variant-numeric:tabular-nums;cursor:pointer">90s</button>
      <button style="height:32px;padding:0 10px;border-radius:4px;border:1px solid #262626;background:transparent;color:#a3a3a3;font-size:11px;font-variant-numeric:tabular-nums;cursor:pointer">120s</button>
      <button style="height:32px;padding:0 10px;border-radius:4px;border:1px solid #262626;background:transparent;color:#a3a3a3;font-size:11px;font-variant-numeric:tabular-nums;cursor:pointer">180s</button>
      <button style="margin-left:auto;height:32px;padding:0 12px;border-radius:4px;background:#262626;color:#d4d4d4;font-size:11px;border:none;cursor:pointer">Start</button>
    </div>
  </div>
</div>
</body></html>
